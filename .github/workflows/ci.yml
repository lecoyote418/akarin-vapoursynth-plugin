name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos-arm64:
    runs-on: macos-14   # Apple Silicon runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: |
          brew update
          brew install meson ninja llvm@17 libxml2 zlib vapoursynth@72

      - name: Configure environment for LLVM 17
        run: |
          echo "/opt/homebrew/opt/llvm@17/bin" >> $GITHUB_PATH
          echo "LDFLAGS=-L/opt/homebrew/opt/llvm@17/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I/opt/homebrew/opt/llvm@17/include" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/opt/homebrew/opt/llvm@17/lib/pkgconfig" >> $GITHUB_ENV

      - name: Configure build
        run: |
          meson setup builddir \
            --buildtype release \
            --default-library=shared

      - name: Build
        run: meson compile -C builddir

      - name: Verify architecture
        run: |
          file builddir/libakarin.dylib
          otool -L builddir/libakarin.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: akarin-macos-arm64
          path: builddir/libakarin.dylib
